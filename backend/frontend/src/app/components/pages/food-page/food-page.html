<app-not-found [visible]="!food"
notFoundMessage="Food Not Found"
  resetLinkText="Back To Homepage"></app-not-found>
<div *ngIf="food!" class="container">
  <img [src]="food!.imageUrl" [alt]="food!.name"/>

  <div class="details">
    <div class="header">
      <span class="name">
        {{food!.name}}
      </span>
      <span class="favorite {{food!.favorite? '': 'not'}}">❤</span>
  
   </div>
    <div class="rating">
                <p-rating
            [(ngModel)]="food!.stars"
            [stars]="5"
            [readonly]="true"
            [iconOnClass]="'pi pi-star-fill'"
            [iconOffClass]="'pi pi-star-fill'"
            [iconOnStyle]="{ 'color': 'red', 'font-size': '18px' }"
            [iconOffStyle]="{ 'color': 'black', 'font-size': '18px' }">
          </p-rating>
          
    </div>

    <div class="origins">
      <span *ngFor="let origin of food!.origins">
        {{origin}}
      </span>
    </div>

    <div class="tags">
      <a *ngFor="let tag of food!.tags" routerLink="/tag/{{tag}}">
        {{tag}}
      </a>
    </div>

    <div class="cook-time">
      <span>
        Time to cook about <strong>{{food!.cookTime}}</strong> minutes
      </span>
    </div>

    <div class="price">
      <span>
        {{food!.price | currency}}
      </span>
    </div>

    <button (click)="addToCart(food!)">Add To Cart</button>

  </div>
</div>
