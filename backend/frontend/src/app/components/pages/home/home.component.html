<app-search></app-search>
<app-tags></app-tags>
<app-not-found [visible]="!foods || !foods.length" resetLinkText="Reset Search"></app-not-found>
<ul *ngIf="foods && foods.length">
    <li *ngFor="let food of foods">
      <a routerLink="/food/{{food.id}}">
        <img [src]="food.imageUrl" [alt]="food.name"/>
        <div class="content">
          <div class="name">
            {{food.name}}
          </div>
          <span class="favorite {{food.favorite?'':'not'}}">
            ❤
          </span>
          <div class="stars">
            <p-rating
            [(ngModel)]="food.stars"
            [stars]="5"
            [readonly]="true"
            [iconOnClass]="'pi pi-star-fill'"
            [iconOffClass]="'pi pi-star-fill'"
            [iconOnStyle]="{ 'color': 'red', 'font-size': '18px' }"
            [iconOffStyle]="{ 'color': 'black', 'font-size': '18px' }">
          </p-rating>
          </div>
          <div class="product-item-footer">
            <div class="origins">
              <span *ngFor="let origin of food.origins">
                {{origin}}
              </span>
            </div>
  
            <div class="cook-time">
              <span>🕒</span>
              {{food.cookTime}}
            </div>
          </div>
  
          <div class="price">
            <span>
              {{food.price | currency}}
            </span>
          </div>
        </div>
      </a>
    </li>
  </ul>
